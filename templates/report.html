<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{REPORT_TITLE}}</title>
  <style>
    :root { color-scheme: light; --ink:#18212b; --muted:#52606d; --line:#cbd5df; --paper:#fff; --panel:#f4f7fa; --error:#a51d2d; --warning:#8a5a00; --info:#185b8f; }
    * { box-sizing: border-box; }
    body { margin:0; background:#e9eef3; color:var(--ink); font:16px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif; }
    main { width:min(72rem,calc(100% - 2rem)); margin:2rem auto; padding:clamp(1rem,3vw,3rem); background:var(--paper); box-shadow:0 0.25rem 1rem #18212b20; }
    h1,h2,h3 { line-height:1.2; } h1 { margin-top:0; } a { color:#064f87; }
    .lede,.meta,.limitations { color:var(--muted); } .summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(9rem,1fr)); gap:1rem; }
    .metric,.finding,.provenance,.limitations { border:1px solid var(--line); border-radius:.35rem; padding:1rem; }
    .metric strong { display:block; font-size:1.8rem; } .finding { margin:1rem 0; border-left-width:.45rem; }
    .finding.error { border-left-color:var(--error); } .finding.warning { border-left-color:var(--warning); } .finding.info { border-left-color:var(--info); }
    .severity { font-weight:700; text-transform:uppercase; } dl { display:grid; grid-template-columns:max-content 1fr; gap:.35rem 1rem; } dt { font-weight:700; } dd { margin:0; min-width:0; }
    pre,code { font-family:ui-monospace,SFMono-Regular,Consolas,monospace; } pre { overflow:auto; padding:1rem; background:#101820; color:#f7fafc; white-space:pre-wrap; overflow-wrap:anywhere; }
    table { width:100%; border-collapse:collapse; } th,td { padding:.55rem; border:1px solid var(--line); text-align:left; } th { background:var(--panel); }
    @media (max-width:40rem) { main { width:100%; margin:0; box-shadow:none; } dl { grid-template-columns:1fr; } dt { margin-top:.5rem; } }
    @media print { body { background:#fff; } main { width:100%; margin:0; padding:0; box-shadow:none; } a { color:inherit; text-decoration:none; } .finding { break-inside:avoid; } }
  </style>
</head>
<body>
<main>
  <header><h1>{{REPORT_TITLE}}</h1><p class="lede">{{EXECUTIVE_SUMMARY}}</p><p class="meta">Generated: {{GENERATED_AT}}</p></header>
  <section aria-labelledby="summary-heading"><h2 id="summary-heading">Summary</h2><div class="summary">{{SEVERITY_METRICS}}</div></section>
  <section aria-labelledby="provenance-heading"><h2 id="provenance-heading">Inputs and provenance</h2><div class="provenance">{{PROVENANCE}}</div></section>
  <section aria-labelledby="findings-heading"><h2 id="findings-heading">Detailed findings</h2>{{FINDINGS}}</section>
  <section aria-labelledby="limitations-heading"><h2 id="limitations-heading">Limitations and verification</h2><div class="limitations">{{LIMITATIONS}}</div></section>
  <section aria-labelledby="sources-heading"><h2 id="sources-heading">Sources</h2>{{SOURCES}}</section>
</main>
</body>
</html>
